<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('活动管理')" />
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="activity-form">
                <div class="select-list">
                    <ul>
                        <li>活动标题：<input type="text" name="title"/></li>
                        <li>活动地点：<input type="text" name="location"/></li>
                        <li>
                            活动状态：
                            <select name="status">
                                <option value="">全部</option>
                                <option value="upcoming">未开始</option>
                                <option value="ongoing">进行中</option>
                                <option value="completed">已完成</option>
                                <option value="canceled">已取消</option>
                            </select>
                        </li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>
        <div class="btn-group-sm" id="toolbar" role="group">
            <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="motorclub:activity:add"><i class="fa fa-plus"></i> 新增</a>
            <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="motorclub:activity:edit"><i class="fa fa-edit"></i> 编辑</a>
            <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="motorclub:activity:remove"><i class="fa fa-remove"></i> 删除</a>
        </div>
        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">
    var editFlag = [[${@permission.hasPermi('motorclub:activity:edit')}]];
    var removeFlag = [[${@permission.hasPermi('motorclub:activity:remove')}]];
    var prefix = ctx + "motorclub/activity";

    $(function() {
        var options = {
            url: prefix + "/list",
            createUrl: prefix + "/add",
            updateUrl: prefix + "/edit/{id}",
            removeUrl: prefix + "/remove",
            modalName: "活动",
            columns: [{
                checkbox: true
            },
            {
                field: 'activityId',
                title: '编号'
            },
            {
                field: 'title',
                title: '活动标题'
            },
            {
                field: 'activityDate',
                title: '活动日期'
            },
            {
                field: 'location',
                title: '活动地点'
            },
            {
                field: 'capacity',
                title: '人数上限'
            },
            {
                field: 'currentParticipants',
                title: '已通过人数'
            },
            {
                field: 'status',
                title: '活动状态'
            },
            {
                title: '操作',
                align: 'center',
                formatter: function(value, row) {
                    var actions = [];
                    actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.activityId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                    actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.activityId + '\')"><i class="fa fa-remove"></i>删除</a>');
                    return actions.join('');
                }
            }]
        };
        $.table.init(options);
    });
</script>
</body>
</html>
