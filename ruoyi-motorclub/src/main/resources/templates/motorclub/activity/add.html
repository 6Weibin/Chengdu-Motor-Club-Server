<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('新增活动')" />
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-activity-add">
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">活动标题：</label>
            <div class="col-sm-8">
                <input name="title" class="form-control" type="text" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">活动日期：</label>
            <div class="col-sm-8">
                <input name="activityDate" class="form-control" type="text" placeholder="yyyy-MM-dd HH:mm:ss" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">开始时间：</label>
            <div class="col-sm-8">
                <input name="startTime" class="form-control" type="text" placeholder="09:00" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">结束时间：</label>
            <div class="col-sm-8">
                <input name="endTime" class="form-control" type="text" placeholder="18:00" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">活动地点：</label>
            <div class="col-sm-8">
                <input name="location" class="form-control" type="text" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">人数上限：</label>
            <div class="col-sm-8">
                <input name="capacity" class="form-control" type="number" min="1" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">封面图：</label>
            <div class="col-sm-8">
                <input name="coverImageUrl" class="form-control" type="text">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">活动状态：</label>
            <div class="col-sm-8">
                <select name="status" class="form-control">
                    <option value="upcoming">未开始</option>
                    <option value="ongoing">进行中</option>
                    <option value="completed">已完成</option>
                    <option value="canceled">已取消</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">活动描述：</label>
            <div class="col-sm-8">
                <textarea name="description" class="form-control" rows="5"></textarea>
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<script type="text/javascript">
    var prefix = ctx + "motorclub/activity";

    function submitHandler() {
        if ($.validate.form()) {
            $.operate.save(prefix + "/add", $('#form-activity-add').serialize());
        }
    }
</script>
</body>
</html>
