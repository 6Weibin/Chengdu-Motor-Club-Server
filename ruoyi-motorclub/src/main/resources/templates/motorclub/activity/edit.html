<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('编辑活动')" />
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-activity-edit" th:object="${activity}">
        <input name="activityId" th:field="*{activityId}" type="hidden">
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">活动标题：</label>
            <div class="col-sm-8">
                <input name="title" th:field="*{title}" class="form-control" type="text" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">活动日期：</label>
            <div class="col-sm-8">
                <input name="activityDate" th:value="${#dates.format(activity.activityDate, 'yyyy-MM-dd HH:mm:ss')}" class="form-control" type="text" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">开始时间：</label>
            <div class="col-sm-8">
                <input name="startTime" th:field="*{startTime}" class="form-control" type="text" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">结束时间：</label>
            <div class="col-sm-8">
                <input name="endTime" th:field="*{endTime}" class="form-control" type="text" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">活动地点：</label>
            <div class="col-sm-8">
                <input name="location" th:field="*{location}" class="form-control" type="text" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">人数上限：</label>
            <div class="col-sm-8">
                <input name="capacity" th:field="*{capacity}" class="form-control" type="number" min="1" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">封面图：</label>
            <div class="col-sm-8">
                <input name="coverImageUrl" th:field="*{coverImageUrl}" class="form-control" type="text">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">活动状态：</label>
            <div class="col-sm-8">
                <select name="status" th:field="*{status}" class="form-control">
                    <option value="upcoming">未开始</option>
                    <option value="ongoing">进行中</option>
                    <option value="completed">已完成</option>
                    <option value="canceled">已取消</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">活动描述：</label>
            <div class="col-sm-8">
                <textarea name="description" class="form-control" rows="5">[[*{description}]]</textarea>
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<script type="text/javascript">
    var prefix = ctx + "motorclub/activity";

    function submitHandler() {
        if ($.validate.form()) {
            $.operate.save(prefix + "/edit", $('#form-activity-edit').serialize());
        }
    }
</script>
</body>
</html>
