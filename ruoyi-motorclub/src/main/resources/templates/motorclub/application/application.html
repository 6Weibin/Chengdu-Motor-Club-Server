<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('入会申请列表')" />
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="application-form">
                <div class="select-list">
                    <ul>
                        <li>手机号：<input type="text" name="phone"/></li>
                        <li>真实姓名：<input type="text" name="realName"/></li>
                        <li>
                            申请状态：
                            <select name="status">
                                <option value="">全部</option>
                                <option value="pending">待审核</option>
                                <option value="approved">已通过</option>
                                <option value="rejected">已驳回</option>
                            </select>
                        </li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>
        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">
    var reviewFlag = [[${@permission.hasPermi('motorclub:application:review')}]];
    var prefix = ctx + "motorclub/application";

    $(function() {
        var options = {
            url: prefix + "/list",
            modalName: "入会申请",
            columns: [{
                field: 'applicationId',
                title: '申请编号'
            },
            {
                field: 'user.nickName',
                title: '用户昵称',
                formatter: function(value, row) {
                    return row.user ? row.user.nickName : '';
                }
            },
            {
                field: 'phone',
                title: '手机号'
            },
            {
                field: 'realName',
                title: '真实姓名'
            },
            {
                field: 'carModel',
                title: '车型'
            },
            {
                field: 'status',
                title: '申请状态'
            },
            {
                field: 'createTime',
                title: '申请时间'
            },
            {
                title: '操作',
                align: 'center',
                formatter: function(value, row) {
                    var actions = [];
                    actions.push('<a class="btn btn-info btn-xs ' + reviewFlag + '" href="javascript:void(0)" onclick="openDetail(\'' + row.userId + '\')"><i class="fa fa-search"></i>详情</a>');
                    return actions.join('');
                }
            }]
        };
        $.table.init(options);
    });

    function openDetail(userId) {
        $.modal.open("审核入会申请", prefix + "/detail/" + userId, 700, 560);
    }
</script>
</body>
</html>
