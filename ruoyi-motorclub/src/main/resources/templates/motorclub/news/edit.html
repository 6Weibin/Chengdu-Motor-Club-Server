<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('编辑新闻')" />
    <th:block th:include="include :: summernote-css" />
    <th:block th:include="include :: datetimepicker-css" />
    <style type="text/css">
        .news-cover-preview-box {
            margin-top: 15px;
        }

        .news-cover-preview-image {
            width: 240px;
            height: 150px;
            border: 1px solid #e5e6e7;
            border-radius: 4px;
            object-fit: cover;
            display: none;
            background: #f8f8f8;
        }

        .news-cover-preview-placeholder {
            width: 240px;
            height: 150px;
            border: 1px dashed #d2d2d2;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999999;
            background: #fafafa;
        }
    </style>
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-news-edit" th:object="${news}">
        <input name="newsId" th:field="*{newsId}" type="hidden">
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">标题：</label>
            <div class="col-sm-8">
                <input name="title" th:field="*{title}" class="form-control" type="text" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">标签：</label>
            <div class="col-sm-8">
                <input name="tagName" th:field="*{tagName}" class="form-control" type="text" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">摘要：</label>
            <div class="col-sm-8">
                <textarea name="summary" th:field="*{summary}" class="form-control" rows="3" required></textarea>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">封面图地址：</label>
            <div class="col-sm-8">
                <input name="coverImageUrl" th:field="*{coverImageUrl}" class="form-control" type="text" required>
                <span class="help-block">支持直接填写图片地址，或选择本地图片自动上传并回填地址。</span>
                <input id="coverImageFile" class="form-control" type="file" accept="image/*" style="margin-top: 10px;">
                <div class="news-cover-preview-box">
                    <img id="coverImagePreview" class="news-cover-preview-image" alt="新闻封面预览">
                    <div id="coverImagePlaceholder" class="news-cover-preview-placeholder">暂未选择封面图</div>
                </div>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">发布时间：</label>
            <div class="col-sm-8">
                <input id="publishTime" name="publishTime" class="form-control" type="text" th:value="${#dates.format(news.publishTime, 'yyyy-MM-dd HH:mm:ss')}" readonly="readonly" required>
                <span class="help-block">点击选择发布时间，无需手工填写时间格式。</span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">状态：</label>
            <div class="col-sm-8">
                <select name="status" th:field="*{status}" class="form-control">
                    <option value="0">上线</option>
                    <option value="1">下线</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">正文：</label>
            <div class="col-sm-8">
                <input id="content" name="content" th:field="*{content}" type="hidden">
                <div id="editor" class="summernote"></div>
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<th:block th:include="include :: summernote-js" />
<th:block th:include="include :: datetimepicker-js" />
<script type="text/javascript">
    var prefix = ctx + "motorclub/news";

    $(function() {
        // 初始化封面图交互，并在编辑场景优先展示当前已保存封面图。
        bindCoverImageUploader();
        previewCoverImage($("input[name='coverImageUrl']").val());
        // 编辑场景统一通过日期时间选择器维护发布时间，保留当前回显值作为默认选中时间。
        initPublishTimePicker();
        $('.summernote').summernote({
            placeholder: '请输入新闻正文',
            height: 260,
            lang: 'zh-CN',
            followingToolbar: false,
            dialogsInBody: true,
            callbacks: {
                onImageUpload: function(files) {
                    sendFile(files[0], this);
                }
            }
        });
        $('#editor').summernote('code', $("#content").val());
    });

    /**
     * 复用后台通用上传接口，保证正文图片可直接进入富文本内容。
     *
     * @param file 上传文件
     * @param obj 当前编辑器对象
     */
    function sendFile(file, obj) {
        var data = new FormData();
        data.append("file", file);
        $.ajax({
            type: "POST",
            url: ctx + "common/upload",
            data: data,
            cache: false,
            contentType: false,
            processData: false,
            dataType: 'json',
            success: function(result) {
                if (result.code == web_status.SUCCESS) {
                    $(obj).summernote('editor.insertImage', result.url, result.fileName);
                } else {
                    $.modal.alertError(result.msg);
                }
            },
            error: function() {
                $.modal.alertWarning("图片上传失败。");
            }
        });
    }

    /**
     * 绑定封面图上传与预览事件。
     */
    function bindCoverImageUploader() {
        $("input[name='coverImageUrl']").on("input", function() {
            // 允许运营手工粘贴图片地址时同步预览当前图片。
            previewCoverImage($(this).val());
        });

        $("#coverImageFile").on("change", function() {
            var file = this.files[0];
            if (!file) {
                return;
            }
            if (!/^image\/.+$/.test(file.type)) {
                $.modal.alertWarning("请选择图片文件。");
                $(this).val("");
                return;
            }
            // 先展示本地预览，再异步上传，减少运营等待时的不确定感。
            previewLocalCoverImage(file);
            uploadCoverImage(file);
        });
    }

    /**
     * 上传封面图并回填封面图地址。
     *
     * @param file 图片文件
     */
    function uploadCoverImage(file) {
        var data = new FormData();
        data.append("file", file);
        data.append("bizType", "news-cover");
        data.append("publicAccess", "Y");
        $.modal.loading("封面图上传中，请稍候...");
        $.ajax({
            type: "POST",
            url: ctx + "secure-file/file/upload",
            data: data,
            cache: false,
            contentType: false,
            processData: false,
            dataType: "json",
            success: function(result) {
                $.modal.closeLoading();
                if (result.code == web_status.SUCCESS) {
                    var fileInfo = result.data || {};
                    if (!fileInfo.viewUrl) {
                        $.modal.alertError("文件中心未返回图片查看地址。");
                        return;
                    }
                    // 上传成功后以文件中心的公开查看地址为准，门户展示时通过文件 ID 实时解密输出图片。
                    $("input[name='coverImageUrl']").val(fileInfo.viewUrl);
                    previewCoverImage(fileInfo.viewUrl);
                    $.modal.msgSuccess("封面图上传成功");
                } else {
                    $.modal.alertError(result.msg);
                }
            },
            error: function() {
                $.modal.closeLoading();
                $.modal.alertError("封面图上传失败。");
            }
        });
    }

    /**
     * 预览本地待上传封面图。
     *
     * @param file 图片文件
     */
    function previewLocalCoverImage(file) {
        var reader = new FileReader();
        reader.onload = function(e) {
            renderCoverImagePreview(e.target.result);
        };
        reader.readAsDataURL(file);
    }

    /**
     * 预览已存在的封面图地址。
     *
     * @param imageUrl 图片地址
     */
    function previewCoverImage(imageUrl) {
        if (!imageUrl) {
            clearCoverImagePreview();
            return;
        }
        renderCoverImagePreview(imageUrl);
    }

    /**
     * 渲染封面图预览区域。
     *
     * @param imageUrl 图片地址
     */
    function renderCoverImagePreview(imageUrl) {
        $("#coverImagePreview").attr("src", imageUrl).show();
        $("#coverImagePlaceholder").hide();
    }

    /**
     * 清空封面图预览区域。
     */
    function clearCoverImagePreview() {
        $("#coverImagePreview").attr("src", "").hide();
        $("#coverImagePlaceholder").show();
    }

    /**
     * 初始化发布时间选择器。
     */
    function initPublishTimePicker() {
        $("#publishTime").datetimepicker({
            format: "yyyy-mm-dd hh:ii:ss",
            todayBtn: true,
            autoclose: true
        });
    }

    $("#form-news-edit").validate({
        focusCleanup: true
    });

    /**
     * 提交编辑新闻表单。
     */
    function submitHandler() {
        if ($.validate.form()) {
            // 提交前将富文本 HTML 同步到隐藏域，避免正文丢失。
            var content = $('.summernote').summernote('code');
            if (!content || content === '<p><br></p>') {
                $.modal.alertWarning("新闻正文不能为空");
                return;
            }
            $("#content").val(content);
            $.operate.save(prefix + "/edit", $('#form-news-edit').serialize());
        }
    }
</script>
</body>
</html>
