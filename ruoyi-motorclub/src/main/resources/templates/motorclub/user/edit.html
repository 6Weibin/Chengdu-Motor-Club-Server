<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('编辑会员用户')" />
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-user-edit" th:object="${user}">
        <input name="userId" th:field="*{userId}" type="hidden">
        <div class="form-group">
            <label class="col-sm-3 control-label">昵称：</label>
            <div class="col-sm-8">
                <input name="nickName" th:field="*{nickName}" class="form-control" type="text" readonly>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">手机号：</label>
            <div class="col-sm-8">
                <input name="phone" th:field="*{phone}" class="form-control" type="text">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">真实姓名：</label>
            <div class="col-sm-8">
                <input name="realName" th:field="*{realName}" class="form-control" type="text">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">车型：</label>
            <div class="col-sm-8">
                <input name="carModel" th:field="*{carModel}" class="form-control" type="text">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">会员状态：</label>
            <div class="col-sm-8">
                <select name="memberStatus" th:field="*{memberStatus}" class="form-control">
                    <option value="visitor">游客</option>
                    <option value="member">会员</option>
                    <option value="disabled">停用会员</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">管理员类型：</label>
            <div class="col-sm-8">
                <select name="appAdminType" th:field="*{appAdminType}" class="form-control">
                    <option value="none">普通用户</option>
                    <option value="admin">业务管理员</option>
                    <option value="super_admin">超级管理员</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">账号状态：</label>
            <div class="col-sm-8">
                <select name="status" th:field="*{status}" class="form-control">
                    <option value="0">正常</option>
                    <option value="1">停用</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">业务权限：</label>
            <div class="col-sm-8">
                <label class="check-box">
                    <input id="memberManage" type="checkbox" th:checked="${user.adminPermission != null and user.adminPermission.memberManage == '1'}"> 成员管理
                </label>
                <label class="check-box">
                    <input id="activityManage" type="checkbox" th:checked="${user.adminPermission != null and user.adminPermission.activityManage == '1'}"> 活动管理
                </label>
                <label class="check-box">
                    <input id="bannerManage" type="checkbox" th:checked="${user.adminPermission != null and user.adminPermission.bannerManage == '1'}"> Banner管理
                </label>
                <label class="check-box">
                    <input id="benefitManage" type="checkbox" th:checked="${user.adminPermission != null and user.adminPermission.benefitManage == '1'}"> 权益管理
                </label>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">备注：</label>
            <div class="col-sm-8">
                <textarea name="remark" class="form-control">[[*{remark}]]</textarea>
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">
    var prefix = ctx + "motorclub/user";

    function submitHandler() {
        if ($.validate.form()) {
            $.operate.save(prefix + "/edit", $('#form-user-edit').serialize());
            savePermission();
        }
    }

    /* 用户基础资料与业务权限拆成两个接口，页面提交时顺序保存，保证权限变更不丢失。 */
    function savePermission() {
        var data = {
            userId: $("input[name='userId']").val(),
            memberManage: $("#memberManage").is(":checked") ? "1" : "0",
            activityManage: $("#activityManage").is(":checked") ? "1" : "0",
            bannerManage: $("#bannerManage").is(":checked") ? "1" : "0",
            benefitManage: $("#benefitManage").is(":checked") ? "1" : "0"
        };
        $.ajax({
            url: prefix + "/permission",
            type: "post",
            contentType: "application/json",
            data: JSON.stringify(data)
        });
    }
</script>
</body>
</html>
