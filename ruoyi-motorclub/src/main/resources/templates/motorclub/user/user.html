<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('会员用户列表')" />
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="user-form">
                <div class="select-list">
                    <ul>
                        <li>昵称：<input type="text" name="nickName"/></li>
                        <li>手机号：<input type="text" name="phone"/></li>
                        <li>真实姓名：<input type="text" name="realName"/></li>
                        <li>
                            会员状态：
                            <select name="memberStatus">
                                <option value="">全部</option>
                                <option value="visitor">游客</option>
                                <option value="member">会员</option>
                                <option value="disabled">停用会员</option>
                            </select>
                        </li>
                        <li>
                            管理员类型：
                            <select name="appAdminType">
                                <option value="">全部</option>
                                <option value="none">普通用户</option>
                                <option value="admin">业务管理员</option>
                                <option value="super_admin">超级管理员</option>
                            </select>
                        </li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>
        <div class="btn-group-sm" id="toolbar" role="group">
            <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="motorclub:user:edit">
                <i class="fa fa-edit"></i> 编辑
            </a>
        </div>
        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">
    var editFlag = [[${@permission.hasPermi('motorclub:user:edit')}]];
    var removeFlag = [[${@permission.hasPermi('motorclub:user:remove')}]];
    var prefix = ctx + "motorclub/user";

    $(function() {
        var options = {
            url: prefix + "/list",
            updateUrl: prefix + "/edit/{id}",
            modalName: "会员用户",
            columns: [{
                checkbox: true
            },
            {
                field: 'userId',
                title: '编号'
            },
            {
                field: 'nickName',
                title: '昵称'
            },
            {
                field: 'phone',
                title: '手机号'
            },
            {
                field: 'realName',
                title: '真实姓名'
            },
            {
                field: 'carModel',
                title: '车型'
            },
            {
                field: 'memberStatus',
                title: '会员状态'
            },
            {
                field: 'appAdminType',
                title: '管理员类型'
            },
            {
                field: 'status',
                title: '账号状态',
                formatter: function(value) {
                    return value === '0' ? '正常' : '停用';
                }
            },
            {
                field: 'joinTime',
                title: '入会时间'
            },
            {
                title: '操作',
                align: 'center',
                formatter: function(value, row) {
                    var actions = [];
                    actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.userId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                    if (row.status === '0') {
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="disableUser(\'' + row.userId + '\')"><i class="fa fa-ban"></i>停用</a>');
                    }
                    return actions.join('');
                }
            }]
        };
        $.table.init(options);
    });

    /* 停用用户后同步失效其登录状态，避免后台与 App 侧状态不一致。 */
    function disableUser(userId) {
        $.modal.confirm("确认停用该用户吗？", function() {
            $.operate.submit(prefix + "/disable/" + userId, "post", "json");
        });
    }
</script>
</body>
</html>
