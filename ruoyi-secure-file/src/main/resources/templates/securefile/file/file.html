<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('文件管理')" />
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="file-form">
                <div class="select-list">
                    <ul>
                        <li>文件名：<input type="text" name="originalName"/></li>
                        <li>后缀：<input type="text" name="fileExt"/></li>
                        <li>业务类型：<input type="text" name="bizType"/></li>
                        <li>
                            公开：
                            <select name="publicAccess">
                                <option value="">全部</option>
                                <option value="Y">是</option>
                                <option value="N">否</option>
                            </select>
                        </li>
                        <li>
                            状态：
                            <select name="status">
                                <option value="">全部</option>
                                <option value="0">正常</option>
                                <option value="1">禁用</option>
                                <option value="2">删除</option>
                            </select>
                        </li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>
        <div class="btn-group-sm" id="toolbar" role="group">
            <a class="btn btn-success" onclick="openUpload()" shiro:hasPermission="securefile:file:upload"><i class="fa fa-upload"></i> 上传</a>
            <a class="btn btn-primary single disabled" onclick="downloadFile()" shiro:hasPermission="securefile:file:download"><i class="fa fa-download"></i> 下载</a>
            <a class="btn btn-info single disabled" onclick="showDetail()" shiro:hasPermission="securefile:file:list"><i class="fa fa-eye"></i> 详情</a>
            <a class="btn btn-warning single disabled" onclick="changeStatus('disable')" shiro:hasPermission="securefile:file:edit"><i class="fa fa-ban"></i> 禁用</a>
            <a class="btn btn-success single disabled" onclick="changeStatus('enable')" shiro:hasPermission="securefile:file:edit"><i class="fa fa-check"></i> 启用</a>
            <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="securefile:file:remove"><i class="fa fa-remove"></i> 删除</a>
        </div>
        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>

<div id="uploadBox" style="display:none;padding:15px;">
    <form id="uploadForm" class="form-horizontal">
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">选择文件：</label>
            <div class="col-sm-8">
                <input id="uploadFile" name="file" class="form-control" type="file" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">业务类型：</label>
            <div class="col-sm-8">
                <input name="bizType" class="form-control" type="text" value="default">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">公开访问：</label>
            <div class="col-sm-8">
                <select name="publicAccess" class="form-control">
                    <option value="N">否</option>
                    <option value="Y">是</option>
                </select>
            </div>
        </div>
    </form>
</div>

<th:block th:include="include :: footer" />
<script th:inline="javascript">
    var prefix = ctx + "secure-file/file";

    $(function() {
        var options = {
            url: prefix + "/list",
            removeUrl: prefix + "/remove",
            modalName: "文件",
            columns: [{
                checkbox: true
            },
            {
                field: 'fileId',
                title: '文件ID'
            },
            {
                field: 'originalName',
                title: '文件名'
            },
            {
                field: 'fileExt',
                title: '后缀'
            },
            {
                field: 'fileSize',
                title: '大小',
                formatter: function(value) {
                    return value + " B";
                }
            },
            {
                field: 'contentType',
                title: 'MIME'
            },
            {
                field: 'bizType',
                title: '业务类型'
            },
            {
                field: 'publicAccess',
                title: '公开',
                formatter: function(value) {
                    return value === 'Y' ? '是' : '否';
                }
            },
            {
                field: 'status',
                title: '状态',
                formatter: function(value) {
                    if (value === '0') {
                        return '正常';
                    }
                    if (value === '1') {
                        return '禁用';
                    }
                    return '删除';
                }
            },
            {
                field: 'createBy',
                title: '上传人'
            },
            {
                field: 'createTime',
                title: '上传时间'
            }]
        };
        $.table.init(options);
    });

    /**
     * 打开上传弹层。
     */
    function openUpload() {
        layer.open({
            type: 1,
            title: '上传文件',
            area: ['520px', '300px'],
            content: $('#uploadBox'),
            btn: ['上传', '取消'],
            yes: function(index) {
                submitUpload(index);
            }
        });
    }

    /**
     * 提交上传请求。
     *
     * @param index 弹层索引
     */
    function submitUpload(index) {
        var file = $("#uploadFile")[0].files[0];
        if (!file) {
            $.modal.alertWarning("请选择文件。");
            return;
        }
        var data = new FormData($("#uploadForm")[0]);
        $.modal.loading("文件上传中，请稍候...");
        $.ajax({
            type: "POST",
            url: prefix + "/upload",
            data: data,
            cache: false,
            contentType: false,
            processData: false,
            dataType: "json",
            success: function(result) {
                $.modal.closeLoading();
                if (result.code == web_status.SUCCESS) {
                    // 修复点：上传成功后刷新列表，让管理员看到数据库中的文件记录。
                    layer.close(index);
                    $("#uploadForm")[0].reset();
                    $.modal.msgSuccess("上传成功");
                    $.table.refresh();
                } else {
                    $.modal.alertError(result.msg);
                }
            },
            error: function() {
                $.modal.closeLoading();
                $.modal.alertError("文件上传失败。");
            }
        });
    }

    /**
     * 下载选中文件。
     */
    function downloadFile() {
        var id = $.table.selectFirstColumns();
        window.location.href = prefix + "/download/" + id;
    }

    /**
     * 查看选中文件详情。
     */
    function showDetail() {
        var id = $.table.selectFirstColumns();
        $.get(prefix + "/detail/" + id, function(result) {
            if (result.code == web_status.SUCCESS) {
                var data = result.data;
                $.modal.alert("文件ID：" + data.fileId + "<br/>文件名：" + data.fileName + "<br/>后缀：" + data.fileExt + "<br/>大小：" + data.fileSize + " B<br/>MIME：" + data.contentType + "<br/>公开：" + data.publicAccess + "<br/>状态：" + data.status);
            } else {
                $.modal.alertError(result.msg);
            }
        });
    }

    /**
     * 修改选中文件状态。
     *
     * @param action 状态动作
     */
    function changeStatus(action) {
        var id = $.table.selectFirstColumns();
        $.operate.post(prefix + "/" + action, { fileId: id });
    }
</script>
</body>
</html>
